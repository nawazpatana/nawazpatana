<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nawaz Patana - CV</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: #f2f7fa;
      color: #222d36;
      margin: 0; padding: 0;
    }
    .cv-container {
      max-width: 800px;
      background: #fff;
      margin: 40px auto;
      border-radius: 22px;
      box-shadow: 0 8px 40px #1854b473;
      padding: 40px 30px 30px 30px;
    }
    .profile-header {
      text-align: center;
      padding-bottom: 14px;
    }
    .profile-avatar {
      width: 140px; height: 140px;
      border-radius: 50%; border: 6px solid #50bfff;
      margin-bottom: 14px;
      object-fit: cover;
    }
    .profile-name {
      font-size: 2.3rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #1a2745;
    }
    .profile-title {
      font-size: 1.1rem;
      color: #1ba6e4;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .profile-summary {
      color: #607990;
      font-size: 1.07rem;
      margin-bottom: 22px;
    }
    .profile-links a {
      display: inline-block;
      margin: 0 7px;
      color: #1ba6e4; background: #e5f4fd;
      border-radius: 50%;
      width: 38px; height: 38px;
      line-height: 38px;
      font-size: 1.3rem;
      text-align: center;
      transition: background 0.2s, color 0.2s;
    }
    .profile-links a:hover {
      background: #1ba6e4;
      color: #fff;
    }
    .cv-section {
      margin-top: 28px;
    }
    .cv-section-title {
      color: #277fcc;
      border-left: 4px solid #1ba6e4;
      padding-left: 9px;
      font-size: 1.22rem;
      font-weight: 700;
      margin-bottom: 13px;
    }
    .cv-list {
      list-style: none;
      margin: 0; padding: 0;
    }
    .cv-list li {
      margin-bottom: 13px;
    }
    .cv-skillbar {
      background: #e5f4fd;
      border-radius: 10px;
      margin-top: 4px;
      margin-bottom: 8px;
      height: 12px;
      width: 100%;
      position: relative;
    }
    .cv-skillbar-inner {
      height: 12px; border-radius: 10px;
      background: linear-gradient(90deg, #41d8e4, #4099ff 80%);
      width: 0;
      transition: width 1s ease;
      position: absolute;
    }
  </style>
</head>
<body>
  <div class="cv-container">
    <div class="profile-header">
      <img src="https://avatars.githubusercontent.com/u/138724322?v=4" alt="Nawaz Patana" class="profile-avatar">
      <div class="profile-name">Nawaz Patana</div>
      <div class="profile-title">Software Developer &amp; Open Source Enthusiast</div>
      <div class="profile-summary">
        Experienced developer with a passion for building impactful web applications.<br>
        Skilled in <b>JavaScript</b>, <b>Python</b>, and modern frameworks.<br>
        Lifelong learner, creative problem solver.
      </div>
      <div class="profile-links">
        <a href="https://github.com/nawazpatana" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="mailto:nawazpatana@gmail.com" title="Email"><i class="fa fa-envelope"></i></a>
        <a href="https://www.linkedin.com/in/nawazpatana/" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
      </div>
    </div>

    <!-- Experience Section -->
    <div class="cv-section">
      <div class="cv-section-title">Experience</div>
      <ul class="cv-list">
        <li>
          <b>Web Developer - Tech Solutions</b><br>
          <small>2022 - Present</small><br>
          Developed modern, responsive web applications and collaborated with a cross-functional team.
        </li>
        <li>
          <b>Frontend Intern - Dev Studios</b><br>
          <small>2021 - 2022</small><br>
          Built interactive UIs with React and contributed to open-source projects.
        </li>
      </ul>
    </div>

    <!-- Skills Section -->
    <div class="cv-section">
      <div class="cv-section-title">Skills</div>
      <ul class="cv-list">
        <li>
          JavaScript
          <div class="cv-skillbar"><div class="cv-skillbar-inner" style="width:90%"></div></div>
        </li>
        <li>
          Python
          <div class="cv-skillbar"><div class="cv-skillbar-inner" style="width:80%"></div></div>
        </li>
        <li>
          React / Next.js
          <div class="cv-skillbar"><div class="cv-skillbar-inner" style="width:85%"></div></div>
        </li>
        <li>
          HTML5 / CSS3
          <div class="cv-skillbar"><div class="cv-skillbar-inner" style="width:92%"></div></div>
        </li>
      </ul>
    </div>

    <!-- Education Section -->
    <div class="cv-section">
      <div class="cv-section-title">Education</div>
      <ul class="cv-list">
        <li>
          <b>Bachelor of Computer Science</b><br>
          XYZ University &mdash; 2018-2022
        </li>
      </ul>
    </div>

  </div>
</body>
</html>
