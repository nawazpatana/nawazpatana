<!DOCTYPE html>

  <style>
    body {
      background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);

      margin: 0;
      padding: 0;
      color: #f8faff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #222836cc;

      height: 110px;
      border-radius: 50%;

      border: 4px solid #fff1;

      font-size: 2rem;
      font-weight: bold;

      font-size: 1.1rem;
      margin-top: 0;
      letter-spacing: 1.2px;
      font-weight: 500;
    }
    p {
      line-height: 1.55;
      color: #98a8c0;
      margin-bottom: 18px;
    }
    .social {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 18px;
    }
    .social a {
      color: #06d6a0;
      font-size: 1.5rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .social a:hover {
      color: #ffbe0b;
    }
